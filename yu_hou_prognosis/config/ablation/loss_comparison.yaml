# ============================================================
# 损失函数对比消融实验配置
# 对比不同损失函数对生存预测的影响
# ============================================================

experiment:
  name: "ablation_loss_comparison"
  description: "损失函数对比消融实验"

ablations:
  - name: "cox_baseline"
    loss_type: "cox"
    lambda_cox: 1.0
    description: "标准Cox部分似然损失"

  - name: "cox_l2"
    loss_type: "cox_l2"
    lambda_cox: 1.0
    lambda_l2: 0.01
    description: "Cox损失 + L2正则化"

  - name: "cox_weighted"
    loss_type: "cox_weighted"
    lambda_cox: 1.0
    description: "Cox损失 + 事件加权"

# 固定参数
training:
  batch_size: 4
  optimizer:
    lr: 0.0001
  scheduler:
    n_epochs: 8
    n_epochs_decay: 4

model:
  fusion:
    type: "caugf"
