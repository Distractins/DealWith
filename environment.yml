# ============================================================
# DealWith 统一Conda环境 (上下游共用)
# 安装: conda env create -f environment.yml
# 激活: conda activate dealwith
#
# 涵盖:
#   wsi_patch_selection_benchmark (上游WSI切块)
#   yu_hou_prognosis             (下游多模态预后预测)
#
# 目标: RTX 4080 Super, CUDA 12.1, Python 3.10
# ============================================================

name: dealwith
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ---- Python ----
  - python=3.10

  # ---- PyTorch + CUDA 12.1 ----
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=12.1

  # ---- 数据处理 ----
  - numpy>=1.24.0,<2.0.0
  - pandas>=2.0.0
  - scipy>=1.10.0
  - scikit-learn>=1.3.0

  # ---- 图像处理 ----
  - opencv>=4.8.0
  - pillow>=10.0.0

  # ---- 配置管理 ----
  - pyyaml>=6.0

  # ---- 训练工具 ----
  - tqdm>=4.65.0

  # ---- 系统监控 ----
  - psutil>=5.9.0

  # ---- pip包 (不在conda channel中) ----
  - pip
  - pip:
      # WSI读取
      - openslide-python>=1.3.0
      # 生存分析
      - lifelines>=0.27.0
      - scikit-survival>=0.20.0
      # 可视化
      - matplotlib>=3.7.0
      - seaborn>=0.12.0
      # 可选
      - tensorboard>=2.12.0
